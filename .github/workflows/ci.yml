name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install pytest

      - name: Unit / invariant tests
        run: pytest -q tests/

      - name: Validate docker-compose.yml (base + tools profile)
        env:
          LLM_MODEL: test-model.gguf
          RENDER_GID: "990"
          VIDEO_GID: "44"
        run: |
          docker compose config -q
          docker compose --profile tools config -q
